<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Prompt Inspector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 20px;
            font-size: 24px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #475569;
            border-radius: 6px;
            background-color: #334155;
            color: white;
            box-sizing: border-box;
        }
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Anime Prompt Inspector 🔍</h1>
        <p>Digite sua ideia para gerar um prompt incrível:</p>
        <input type="text" placeholder="Ex: Guerreiro cyber-samurai em Neo Tokyo">
        <button onclick="alert('Conectando à API da Groq em breve!')">GERAR PROMPT</button>
    </div>
</body>
</html>
